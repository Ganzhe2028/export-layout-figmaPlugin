<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; background: #1e1e1e; color: #e0e0e0; padding: 16px; display: flex; flex-direction: column; height: 100vh; gap: 12px; }
    #status { font-size: 13px; color: #888; min-height: 20px; }
    #output { flex: 1; background: #141414; border: 1px solid #333; border-radius: 8px; padding: 14px; font: 12px/1.5 "SF Mono", "Fira Code", monospace; white-space: pre-wrap; overflow: auto; color: #ccc; resize: none; outline: none; }
    .btn-row { display: flex; gap: 8px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; transition: background 0.15s; }
    #copy { background: #0d99ff; color: #fff; flex: 1; }
    #copy:hover { background: #0b84e0; }
    #copy.done { background: #1a9c4a; }
    #save { background: #333; color: #ccc; }
    #save:hover { background: #444; }
  </style>
</head>
<body>
  <div id="status">正在读取节点数据...</div>
  <textarea id="output" readonly spellcheck="false"></textarea>
  <div class="btn-row">
    <button id="copy">📋 复制 JSON</button>
    <button id="save">💾 下载 .json</button>
  </div>
  <script>
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const copyBtn = document.getElementById("copy");
    const saveBtn = document.getElementById("save");

    window.onmessage = (e) => {
      const data = e.data.pluginMessage || e.data;
      output.value = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      const parsed = JSON.parse(output.value);
      const count = countNodes(parsed);
      status.textContent = `✅ ${count} 个节点已读取`;

      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(output.value);
        copyBtn.textContent = "✅ 已复制";
        copyBtn.classList.add("done");
        setTimeout(() => {
          copyBtn.textContent = "📋 复制 JSON";
          copyBtn.classList.remove("done");
        }, 2000);
      };

      saveBtn.onclick = () => {
        const blob = new Blob([output.value], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "figma-dump-" + Date.now() + ".json";
        a.click();
        URL.revokeObjectURL(url);
      };
    };

    function countNodes(obj) {
      let count = 1;
      if (obj.children && Array.isArray(obj.children)) {
        for (const child of obj.children) {
          count += countNodes(child);
        }
      }
      return count;
    }
  </script>
</body>
</html>
